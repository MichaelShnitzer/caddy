<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      color: #64748b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 600px;
    }

    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1.75rem 1rem;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      text-decoration: none;
      color: #e2e8f0;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }

    a.card:hover {
      background: #252840;
      border-color: #4f5882;
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .card-desc {
      font-size: 0.75rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <h1>192.168.1.42</h1>
  <div class="grid">
    <a class="card" href="http://tensara">
      <span class="card-icon">🏃</span>
      <span class="card-name">tensara</span>
      <span class="card-desc">Health tracking</span>
    </a>
    <a class="card" href="http://pickarr">
      <span class="card-icon">🎬</span>
      <span class="card-name">pickarr</span>
      <span class="card-desc">Movie picker</span>
    </a>
  </div>
</body>
</html>
